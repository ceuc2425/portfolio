<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Profesional — Carlos Urzola</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Google Fonts for Professional CV -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    .cv-container { max-width: 850px; margin: 40px auto; padding: 50px; background: #fff; color: #333; box-shadow: 0 0 20px rgba(0,0,0,0.05); border-radius: 4px; position: relative; }
    [data-theme="dark"] .cv-container { background: #1a1a1a; color: #e5e5e5; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
    
    .cv-header { text-align: center; border-bottom: 2px solid #1A2E44; padding-bottom: 20px; margin-bottom: 30px; }
    [data-theme="dark"] .cv-header { border-color: #444; }
    .cv-name { font-family: 'Playfair Display', serif; font-size: 28pt; color: #1A2E44; margin: 0; }
    [data-theme="dark"] .cv-name { color: #fff; }
    .cv-title { font-size: 14pt; color: #666; margin: 5px 0; font-weight: 500; }
    [data-theme="dark"] .cv-title { color: #aaa; }
    .cv-contact { display: flex; justify-content: center; gap: 15px; font-size: 9pt; color: #888; margin-top: 10px; font-family: 'JetBrains Mono', monospace; }
    [data-theme="dark"] .cv-contact { color: #777; }

    .cv-section { margin-bottom: 25px; }
    .cv-section-title { font-family: 'Playfair Display', serif; font-size: 14pt; color: #1A2E44; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    [data-theme="dark"] .cv-section-title { color: #fff; border-color: #333; }
    
    .cv-exp-item { margin-bottom: 20px; }
    .cv-exp-header { display: flex; justify-content: space-between; font-weight: 700; color: #333; font-size: 11pt; }
    [data-theme="dark"] .cv-exp-header { color: #eee; }
    .cv-exp-sub { display: flex; justify-content: space-between; font-style: italic; color: #666; font-size: 10pt; margin-bottom: 8px; }
    [data-theme="dark"] .cv-exp-sub { color: #aaa; }
    .cv-exp-desc { font-size: 10pt; line-height: 1.6; color: #444; text-align: justify; }
    [data-theme="dark"] .cv-exp-desc { color: #ccc; }
    
    .cv-edu-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .cv-edu-main { font-weight: 600; font-size: 10pt; }
    .cv-edu-sub { font-size: 9pt; color: #666; }
    [data-theme="dark"] .cv-edu-main { color: #eee; }
    [data-theme="dark"] .cv-edu-sub { color: #aaa; }

    .cv-skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .cv-skill-cat { font-size: 9pt; margin-bottom: 5px; }
    .cv-skill-cat strong { color: #1A2E44; font-family: 'JetBrains Mono', monospace; }
    [data-theme="dark"] .cv-skill-cat strong { color: #93c5fd; }

    .nav-v2 { position: fixed; top: 20px; left: 20px; z-index: 100; }
    .btn-back { padding: 8px 16px; font-size: 0.7rem; font-family: var(--mono); text-transform: uppercase; background: var(--navy); color: #fff; border-radius: 4px; text-decoration: none; transition: opacity 0.2s; }
    .btn-back:hover { opacity: 0.8; }
    .btn-download-pdf { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 8px 16px; font-size: 0.7rem; font-family: var(--mono); text-transform: uppercase; background: var(--blue); color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="nav-v2">
    <a href="index.html" class="btn-back">← Volver al Portfolio</a>
  </div>
  <button class="btn-download-pdf" onclick="downloadPDF()">↓ Exportar PDF Profesional</button>

  <div class="cv-container" id="cv-content">
    <div class="cv-header">
      <h1 class="cv-name" id="v2-name"></h1>
      <div class="cv-title" id="v2-title"></div>
      <div class="cv-contact" id="v2-contact"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Perfil Profesional</div>
      <div id="v2-profile" class="cv-exp-desc"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Experiencia Laboral</div>
      <div id="v2-experience"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Formación Académica</div>
      <div id="v2-education"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Competencias Técnicas</div>
      <div id="v2-skills" class="cv-skills-grid"></div>
    </div>
  </div>

  <script src="js/main2.js"></script>
</body>
</html>
