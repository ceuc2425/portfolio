<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Profesional — Carlos Urzola</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { 
      font-family: Arial, Helvetica, sans-serif; 
      background: #fff; 
      color: #000; 
      margin: 0; 
      padding: 0;
    }
    .cv-container { 
      max-width: 800px; 
      margin: 0 auto; 
      padding: 40px 20px; 
      background: #fff; 
      color: #000; 
    }
    
    .cv-header { 
      text-align: left; 
      margin-bottom: 30px; 
      border-bottom: 1px solid #000; 
      padding-bottom: 10px;
    }
    .cv-name { 
      font-size: 24pt; 
      font-weight: bold; 
      margin: 0; 
      color: #000;
    }
    .cv-title { 
      font-size: 14pt; 
      margin: 5px 0; 
      color: #333;
    }
    .cv-contact { 
      font-size: 10pt; 
      margin-top: 10px; 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      color: #444;
    }
    .cv-contact a { color: #2563eb; text-decoration: none; }

    .cv-section { margin-bottom: 20px; }
    .cv-section-title { 
      font-size: 12pt; 
      font-weight: bold; 
      text-transform: uppercase; 
      border-bottom: 1px solid #000; 
      margin-bottom: 10px; 
      color: #000;
    }
    
    .cv-exp-item { margin-bottom: 15px; }
    .cv-exp-header { 
      display: flex; 
      justify-content: space-between; 
      font-weight: bold; 
      font-size: 11pt; 
    }
    .cv-exp-sub { 
      display: flex; 
      justify-content: space-between; 
      font-style: italic; 
      font-size: 10pt; 
      margin-bottom: 5px; 
    }
    .cv-exp-desc { 
      font-size: 10pt; 
      line-height: 1.5; 
      text-align: justify; 
      margin: 0;
    }
    
    .cv-edu-item { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 5px; 
      font-size: 10pt;
    }
    .cv-edu-main { font-weight: bold; }

    .cv-skills-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 10px; 
      font-size: 9pt; 
    }
    .cv-skill-cat strong { color: #000; }

    .nav-v2 { position: fixed; top: 20px; left: 20px; z-index: 100; }
    .btn-back { 
      padding: 8px 16px; 
      font-size: 0.7rem; 
      background: #000; 
      color: #fff; 
      border-radius: 4px; 
      text-decoration: none; 
    }
    .btn-download-pdf { 
      position: fixed; 
      top: 20px; 
      right: 20px; 
      z-index: 100; 
      padding: 8px 16px; 
      font-size: 0.7rem; 
      background: #2563eb; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
    }

    @media (max-width: 600px) {
      .cv-exp-header, .cv-exp-sub, .cv-edu-item {
        flex-direction: column;
      }
      .cv-skills-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="nav-v2">
    <a href="index.html" class="btn-back">← Volver al Portfolio</a>
  </div>
  <button class="btn-download-pdf" onclick="downloadPDF()">↓ Exportar PDF ATS</button>

  <div class="cv-container" id="cv-content">
    <div class="cv-header">
      <h1 class="cv-name" id="v2-name"></h1>
      <div class="cv-title" id="v2-title"></div>
      <div class="cv-contact" id="v2-contact"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Perfil Profesional</div>
      <div id="v2-profile" class="cv-exp-desc"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Experiencia Laboral</div>
      <div id="v2-experience"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Formación Académica</div>
      <div id="v2-education"></div>
    </div>

    <div class="cv-section">
      <div class="cv-section-title">Competencias Técnicas</div>
      <div id="v2-skills" class="cv-skills-grid"></div>
    </div>
  </div>

  <script src="js/main2.js"></script>
</body>
</html>
